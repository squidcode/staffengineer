# Local dev. OrbStack magic domains → no host ports, no /etc/hosts, auto HTTPS.
# Secrets (${...}) come from Doppler — run with: doppler run -- docker compose up
# Source is mounted for hot reload; node_modules are container-only (anon volumes)
# so host (mac) and container (linux) native deps never clash.
services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace services/frontend"
    environment:
      - NEXT_PUBLIC_API_URL=https://__APP_NAME__-api.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/services/frontend/node_modules
    labels:
      - "dev.orbstack.domains=__APP_NAME__.local"
      - "dev.orbstack.http-port=3000"
    depends_on:
      - backend

  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start:dev --workspace services/backend"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      # New Relic — optional. Dormant unless NEW_RELIC_LICENSE_KEY is set in Doppler.
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY:-}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME:-__APP_NAME__-backend}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/services/backend/node_modules
    labels:
      - "dev.orbstack.domains=__APP_NAME__-api.local"
      - "dev.orbstack.http-port=3000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=__APP_NAME__
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
