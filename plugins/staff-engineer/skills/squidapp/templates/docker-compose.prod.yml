# Production-style: builds the multi-stage Dockerfiles (compiled output only).
# Run: doppler run -- docker compose -f docker-compose.prod.yml up --build
# NEXT_PUBLIC_* is baked at build time, so the API URL is a build arg, not runtime env.
services:
  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://__APP_NAME__-api.local
    labels:
      - "dev.orbstack.domains=__APP_NAME__.local"
      - "dev.orbstack.http-port=3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      # New Relic — optional. Dormant unless NEW_RELIC_LICENSE_KEY is set in Doppler.
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY:-}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME:-__APP_NAME__-backend}
    labels:
      - "dev.orbstack.domains=__APP_NAME__-api.local"
      - "dev.orbstack.http-port=3000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=__APP_NAME__
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
